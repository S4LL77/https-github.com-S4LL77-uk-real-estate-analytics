version: '3.8'

# Apache Airflow locally via Docker Compose
# Includes Postgres (metadata) and Redis (broker for CeleryExecutor)
# Best practice approach to mimic a production environment.

x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.8.1}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    
    # Mount point for our python ingestion scripts
    PYTHONPATH: '/opt/airflow/uk_real_estate_analytics'
    
    # Expose host environment variables (e.g. storage mode, AWS credentials)
    STORAGE_MODE: ${STORAGE_MODE:-local}
    S3_BUCKET_NAME: ${S3_BUCKET_NAME:-uk-real-estate-analytics}
    AWS_REGION: ${AWS_REGION:-eu-west-2}
    LAND_REGISTRY_YEARS: ${LAND_REGISTRY_YEARS:-2024}
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    
  volumes:
    # Map DAGs, plugins to Airflow container natively
    - ./orchestration/dags:/opt/airflow/dags
    - ./orchestration/plugins:/opt/airflow/plugins
    - ./logs:/opt/airflow/logs
    
    # Map ingestion folder and data folder so BashOperator can run our scripts
    - .:/opt/airflow/uk_real_estate_analytics
  user: "${AIRFLOW_UID:-50000}:0"

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  redis:
    image: redis:alline

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    # Simple init script to check DB, init Airflow, and create a default admin user
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        # Need to install pandas/pyarrow inside the default Airflow image to run our ingestion scripts
        pip install pandas pyarrow requests
        
        echo "Initializing Airflow database..."
        airflow db migrate 
        
        echo "Creating default Admin user (admin / admin_password)..."
        airflow users create \
          --role Admin \
          --username admin \
          --password admin_password \
          --email admin@example.com \
          --firstname Data \
          --lastname Engineer

volumes:
  postgres-db-volume:
